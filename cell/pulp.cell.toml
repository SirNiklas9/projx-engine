schema_version = 1

name    = "projx-engine"
version = "0.1.0"
wasm    = "cell.wasm"

# The ENGINE as a cell — the control-plane brain. It serves the store API over
# the host's transport.http.inbound; storage.sqlite persists the store;
# storage.fs writes CLAUDE.md + the history journal into the repo.
# spawn.confine is the CAGE as a capability: POST /api/agent/run calls
# pulp.Confine.RunCaged and the host performs the Landlock/AppContainer (+ Linux
# netns/gVisor egress) launch. spawn.process is the uncaged opt-out launch path.
# No cage deps compile into the wasm — the hands are host-side.
capabilities = ["transport.http.inbound", "transport.http.outbound", "storage.fs", "storage.sqlite", "spawn.confine", "spawn.process", "spawn.pty", "entropy.read"]

# A caged one-shot agent run blocks the step until the agent exits; give it room.
# (Async job submission is a later brick.)
call_timeout_ms = 300000
restart = "on_crash"

[config]
cell_name = "projx-engine"
